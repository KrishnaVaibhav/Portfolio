# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build:dev

  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist

  deploy:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEPLOY_REPO: ${{ vars.DEPLOY_REPO }}
      DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}

    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_REPO != '' && vars.DEPLOY_BRANCH != ''

    steps:
      - name: Validate deployment configuration
        run: |
          if [ -z "${DEPLOY_TOKEN}" ]; then
            echo "Set secrets.DEPLOY_TOKEN to enable deployment."
            exit 1
          fi
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist

      - name: Checkout deployment repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.DEPLOY_REPO }}
          ref: ${{ env.DEPLOY_BRANCH }}
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: deploy-repo

      - name: Copy build files
        run: |
          find deploy-repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. deploy-repo/

      - name: Commit and push build files
        working-directory: deploy-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy build artifacts" || exit 0
          git push origin HEAD:${{ env.DEPLOY_BRANCH }}
